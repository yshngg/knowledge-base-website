name: Update Submodules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git to use HTTPS for submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Update submodules
        run: |
          git submodule update --init --remote

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update content submodule"
          title: "chore: update content submodule"
          body: |
            This PR updates the `content` submodule to its latest commit.

            Auto-generated by the "Update Submodules" workflow.
          branch: update-submodules
          delete-branch: true
          add-paths: content
